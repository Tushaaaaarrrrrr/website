<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Alpha IITIAN | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

    <style>
        body {
            background-color: #020617;
            color: #FFFFFF;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }
        .metallic-text {
            background: linear-gradient(to bottom, #FFFFFF 0%, #94A3B8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: #020617;
            pointer-events: none;
            transition: opacity 1.5s ease;
        }
        
        #main-content {
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        
        #main-content.visible {
            opacity: 1;
        }
    </style>
</head>
<body class="font-body selection:bg-primary selection:text-surface-dim">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
